<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Ventas</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

<div class="container">
    <h1>💰 Calculadora de Ventas</h1>

    <form method="POST">
        <input type="number" step="0.01" name="monto" placeholder="Monto en USD" required>
        <button type="submit">Calcular</button>
    </form>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    {% if resultado %}
    <div class="resultado">
        <p><strong>Dólar:</strong> ${{ resultado.dolar }}</p>
        <p><strong>Monto USD:</strong> ${{ resultado.usd }}</p>
        <p><strong>Descuento:</strong> ${{ resultado.descuento }}</p>
        <p><strong>Neto CLP:</strong> ${{ resultado.neto_clp }}</p>
        <p><strong>IVA:</strong> ${{ resultado.iva }}</p>
        <p class="total"><strong>Total CLP:</strong> ${{ resultado.total }}</p>
    </div>
    {% endif %}
</div>

</body>
</html>
